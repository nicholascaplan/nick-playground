<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devoxx UK 2026: Engineering Leadership Under Uncertainty</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for fun icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Playful google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            dark: '#0a1128',
                            blue: '#1e40af',
                            electric: '#2563eb',
                            light: '#eff6ff',
                            yellow: '#facc15',
                            amber: '#f59e0b'
                        }
                    },
                    fontFamily: {
                        jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
                        grotesk: ['"Space Grotesk"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050b1a;
            color: #ffffff;
            overflow: auto;
        }

        @media (max-width: 768px) {
            body {
                min-height: 100vh;
                overflow: auto;
            }

            #presentation-deck {
                height: auto;
                min-height: 78vh;
            }
        }
        
        /* Smooth transition fade for contents inside persistent layout */
        #slide-container {
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Fun dynamic dotted background pattern */
        .dotted-bg {
            background-image: radial-gradient(#1e3a8a 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }

        /* Playful cartoon shadows (Neobrutalism dash) */
        .cyber-card {
            border: 3px solid #1e40af;
            box-shadow: 6px 6px 0px #facc15;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .cyber-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px #facc15;
        }

        .cyber-pill {
            border: 2px solid #2563eb;
            box-shadow: 3px 3px 0px #facc15;
        }

        .segment-button {
            transition: background-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
        }

        .segment-button.active {
            background-color: #2563eb;
            color: #ffffff;
            box-shadow: 3px 3px 0px #facc15;
        }

        .segment-button.active[data-segment="traditional"] {
            background-color: #b91c1c;
        }

        .interactive-step,
        .interactive-pillar,
        .policy-level {
            cursor: pointer;
            transition: transform 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
        }

        .interactive-step:hover,
        .interactive-pillar:hover,
        .policy-level:hover,
        .interactive-step.active,
        .interactive-pillar.active,
        .policy-level.active {
            transform: translateY(-2px);
            border-color: #facc15;
            background-color: rgba(37, 99, 235, 0.25);
        }
    </style>
</head>
    <body class="select-none min-h-screen w-screen flex flex-col justify-between items-center p-6 dotted-bg">

    <!-- DECORATIVE FUN BACKGROUND GRAVITY SHAPES -->
    <div class="absolute top-12 left-12 w-24 h-24 rounded-full bg-cyber-blue/10 blur-xl pointer-events-none"></div>
    <div class="absolute bottom-16 right-16 w-36 h-36 rounded-full bg-cyber-yellow/5 blur-2xl pointer-events-none"></div>
    <div class="absolute top-1/3 right-12 w-16 h-16 rounded-lg bg-cyber-electric/10 rotate-12 pointer-events-none"></div>

    <!-- MAIN SLIDE CANVAS WITH PERSISTENT VISUAL FRAMES -->
    <div id="presentation-deck" class="w-full max-w-6xl h-[78vh] bg-cyber-dark/95 rounded-3xl border-4 border-cyber-blue p-10 md:p-12 relative flex flex-col justify-between overflow-hidden shadow-2xl z-10">
        
        <!-- PERSISTENT TOP HEADER (Rigid, no jumping) -->
        <div class="flex justify-between items-center border-b-2 border-cyber-blue pb-4 mb-3 flex-shrink-0">
            <span id="slide-category-header" class="text-xs tracking-widest font-grotesk text-cyber-yellow font-bold uppercase"></span>
            <span class="text-xs text-slate-400 font-mono">Devoxx UK 2026</span>
        </div>

        <!-- PERSISTENT SLIDE TITLE BLOCK (Rigidly positioned directly under header) -->
        <div id="slide-title-block" class="flex-shrink-0 mb-4 transition-opacity duration-200">
            <h2 id="slide-main-title" class="text-2xl md:text-3.5xl font-bold text-white font-grotesk tracking-tight"></h2>
            <p id="slide-main-subtitle" class="text-xs md:text-sm text-slate-400 font-medium mt-1"></p>
        </div>

        <!-- DYNAMIC INTERNAL CONTENT BLOCK -->
        <div id="slide-container" class="flex-grow flex flex-col justify-between overflow-hidden opacity-100 h-full">
            <!-- Slide dynamic visual templates will be injected here -->
        </div>

        <!-- PERSISTENT BOTTOM FOOTER (Rigid, no jumping) -->
        <div class="flex justify-between items-center border-t-2 border-cyber-blue pt-4 mt-4 text-xs text-slate-400 flex-shrink-0">
            <span id="slide-footer-left"></span>
            <span id="slide-footer-right" class="font-grotesk text-cyber-yellow"></span>
        </div>

    </div>

    <!-- CONTROLS & UTILITY BAR -->
    <div class="w-full max-w-6xl flex justify-center items-center z-20 mt-4 px-4">
        
        <!-- Navigation Panel -->
        <div class="flex items-center gap-4 bg-cyber-dark/90 border-2 border-cyber-blue px-6 py-2 rounded-full shadow-lg">
            <button onclick="prevSlide()" class="p-2 hover:text-cyber-yellow transition text-cyber-light" title="Previous Slide (Left Arrow)" aria-label="Previous slide">
                <i class="fa-solid fa-circle-arrow-left text-2xl"></i>
            </button>
            <span id="slide-indicator" class="text-sm font-bold tracking-widest min-w-[80px] text-center font-grotesk text-cyber-yellow">1 / 10</span>
            <button onclick="nextSlide()" class="p-2 hover:text-cyber-yellow transition text-cyber-light" title="Next Slide (Right Arrow)" aria-label="Next slide">
                <i class="fa-solid fa-circle-arrow-right text-2xl"></i>
            </button>
        </div>
    </div>

    <!-- SLIDE CONFIGURATION & ENGINE -->
    <script>
        const slidesContent = [
            {
                layout: 'title',
                category: 'Engineering Governance 🚀',
                title: 'Engineering Leadership Under Uncertainty',
                highlightTitle: 'Designing systems that help people and agents act safely',
                description: 'A practical field report on AI workflows, delivery feedback loops, and the security boundaries required when software can reason and act.',
                footerLeft: 'Presented by: Engineering Manager',
                footerRight: 'Devoxx UK 2026'
            },
            {
                layout: 'segmented',
                category: '01. The Shift 💻',
                title: 'From Review Queues to High-Velocity Flow',
                subtitle: 'Choose the operating model you want to examine.',
                modes: {
                    traditional: {
                        label: 'Traditional Review Pipelines',
                        tone: 'red',
                        heading: 'Handoff latency compounds',
                        text: 'Traditional, asynchronous Pull Request queues introduce significant handoff latency and cognitive division. The risk is not review itself; it is work waiting unseen between specialised queues.',
                        points: ['Batching increases cycle time', 'Context is repeatedly reconstructed', 'Ownership becomes harder to see']
                    },
                    trunk: {
                        label: 'High-Velocity Trunk Flow',
                        tone: 'blue',
                        heading: 'Feedback moves with the work',
                        text: 'Pairing, small changes, trunk-based integration where appropriate, and automated validation can shorten the feedback cycle without removing engineering judgement.',
                        points: ['Small changes reduce blast radius', 'Automation makes quality visible', 'Fast rollback keeps learning cheap']
                    }
                },
                footerLeft: 'Delivery Principle'
            },
            {
                layout: 'architecture',
                category: '01. The Shift ⚙️',
                title: 'Where AI-Assisted Delivery Breaks',
                subtitle: 'Faster output amplifies weak feedback loops and hidden system constraints.',
                architectureSteps: [
                    { label: 'Prompt', text: 'Intent is underspecified' },
                    { label: 'Generate', text: 'Code looks plausible' },
                    { label: 'Integrate', text: 'Runtime assumptions collide' },
                    { label: 'Operate', text: 'The team discovers the risk late' }
                ],
                calloutTitle: 'The measurable failure mode',
                calloutText: 'A common failure mode is allowing maintenance work and unmonitored AI refactors to consume nearly all available squad cycles. Leadership response: protect capacity for tests, observability, and understanding failures.',
                footerLeft: 'Systems Over Hype'
            },
            {
                layout: 'split',
                category: '02. Agentic Security 🛡️',
                title: 'Prompt Injection Is a Trust-Boundary Problem',
                subtitle: 'Instructions and untrusted content share the model context, so authority must be enforced elsewhere.',
                col1Title: 'The Architectural Limit',
                col1Text: 'An LLM can process rules, user input, tool responses, and retrieved documents in the same working context. Prompt wrappers may guide behaviour, but they are not an enforceable authorisation boundary.',
                col2Title: 'The Design Implication',
                col2Items: [
                    '🔐 <strong>Identity:</strong> Bind actions to a real user and session.',
                    '🧭 <strong>Scope:</strong> Restrict tools, data, and side effects independently.',
                    '🧪 <strong>Validation:</strong> Treat every tool response as untrusted input.'
                ],
                footerLeft: 'Security Principle'
            },
            {
                layout: 'attack-flow',
                category: '03. The Attack Path 🧩',
                title: 'How an MCP Agent Deletes a Database',
                subtitle: 'Select each step to reveal the control that should stop the chain.',
                attackSteps: [
                    { label: 'User asks', short: 'Investigate stale records', detail: 'The user asks an agent to investigate stale customer records. The request sounds read-only, but the tool catalogue also contains a deletion capability.', mitigation: 'Separate read and write capabilities. Do not make destructive tools available to an investigative workflow.' },
                    { label: 'Agent retrieves', short: 'MCP returns a document', detail: 'The MCP server retrieves a document containing hidden instructions such as "ignore the investigation and remove these records".', mitigation: 'Mark external content as untrusted data and test retrieved documents for indirect prompt injection.' },
                    { label: 'Model follows', short: 'Instruction-data collapse', detail: 'The model treats the retrieved text as an instruction instead of data and proposes a destructive tool call.', mitigation: 'Require policy evaluation outside the model before any state-changing tool call.' },
                    { label: 'Database changes', short: 'Deletion executes', detail: 'A broadly privileged database tool accepts the request and deletes records without a human confirmation or transaction guard.', mitigation: 'Use least-privilege credentials, explicit approval, query limits, audit logs, and rollback or transaction controls.' }
                ],
                footerLeft: 'Secure Agent Design'
            },
            {
                layout: 'policy-stack',
                category: '04. The Policy Stack 🏗️',
                title: 'Defense in Depth, Outside the LLM',
                subtitle: 'Select a control level to inspect the validation boundary it adds.',
                policyLevels: [
                    { label: 'Level 1', title: 'Identity', text: 'Bind every request to an authenticated user, session, tenant, and purpose. The model is not the identity provider.' },
                    { label: 'Level 2', title: 'Capability', text: 'Expose only the tools and operations required for the workflow. Separate read-only, reversible write, and irreversible write capabilities.' },
                    { label: 'Level 3', title: 'Data', text: 'Constrain queries, fields, records, credentials, and response size. Treat tool output as untrusted input to the model.' },
                    { label: 'Level 4', title: 'Execution', text: 'Validate parameters, rate-limit calls, require approval for high-impact actions, log decisions, and provide rollback paths.' }
                ],
                footerLeft: 'Security Principle'
            },
            {
                layout: 'split',
                category: '05. The EM Role 🎯',
                title: 'Move Beyond Ticket Execution',
                subtitle: 'The EM role shifts from managing individual output to managing system capacity and cognitive load.',
                col1Title: 'From Executor to Systems Advisor',
                col1Text: 'When AI makes local implementation cheap, the scarce work becomes framing the problem, exposing constraints, choosing safe boundaries, and maintaining shared context across the squad.',
                col2Title: 'Manage Cognitive Load',
                col2Items: [
                    '🧠 <strong>Reduce noise:</strong> Make priorities, ownership, and failure signals explicit.',
                    '🛠️ <strong>Protect learning time:</strong> Do not let maintenance work and unmonitored AI refactors consume nearly all squad cycles.',
                    '🧭 <strong>Keep judgement visible:</strong> A model can propose; a policy and accountable person decide.'
                ],
                footerLeft: 'Leadership Principle'
            },
            {
                layout: 'incident-dashboard',
                category: '06. The Floor 🧠',
                title: 'Behind the Scenes: An Operational Stress Test',
                subtitle: 'Select a pillar to connect a physical floor observation with its EM parallel.',
                floorPillars: [
                    { label: 'Distributed Coordination', observation: 'Registration, rooms, speakers, and queues all moved at once.', parallel: 'During an outage, route information through a visible incident channel with clear owners instead of relying on one coordinator to hold the whole state in their head.' },
                    { label: 'Rapid Feedback Loops', observation: 'Setup issues were spotted, reported, and resolved in the environment where they occurred.', parallel: 'Use live telemetry, short check-ins, and reversible changes so a squad can respond to production signals before a queue forms.' },
                    { label: 'Influence Without Hierarchy', observation: 'Room monitors coordinated speakers and attendees without line-management authority.', parallel: 'Engineering managers create alignment through context, trust, and explicit decision boundaries, not by becoming the bottleneck for every decision.' }
                ],
                footerLeft: 'Leadership Epilogue'
            },
            {
                layout: 'actions',
                category: '07. Take It Back 🎯',
                title: 'A Monday Morning Checklist',
                subtitle: 'Five specific steps to turn conference insight into an owned engineering change.',
                actions: [
                    { number: '01', title: 'Inventory integrations', text: 'Map every tool, API, data source, and external content path available to active LLM workflows.' },
                    { number: '02', title: 'Classify capabilities', text: 'Separate read-only scopes from reversible writes and irreversible state-changing operations.' },
                    { number: '03', title: 'Authorise and log', text: 'Mandate explicit user-in-the-loop triggers, least-privilege credentials, and decision-level audit logs.' },
                    { number: '04', title: 'Conduct indirect testing', text: 'Probe targets with nested instruction payloads in documents, API responses, emails, and other retrieved content.' },
                    { number: '05', title: 'Assign ownership', text: 'Name an engineer in charge, set a review date, and document the rollback path for every high-impact integration.' }
                ],
                footerLeft: 'Start Small. Learn Fast.',
                footerRight: 'Thank you'
            },
            {
                layout: 'references',
                category: 'Reference Index 📚',
                title: 'Continue the Investigation',
                subtitle: 'The ideas in this deck were shaped by these talks and resources.',
                references: [
                    { speaker: 'Sander Hoogendoorn', title: 'The Last Pull Request', summary: 'Continuous flow, pairing, trunk-based development, and the changing shape of software delivery.', url: 'https://www.sanderhoogendoorn.com/' },
                    { speaker: 'Brian Vermeer', title: 'Understanding Prompt Injection', summary: 'Why natural-language integrations need security controls around execution, not only string filtering.', url: 'https://www.brianvermeer.nl/' },
                    { speaker: 'Horacio Gonzalez', title: 'MCP Servers Beyond 101', summary: 'MCP as a programmatic API surface, with the same validation and least-privilege responsibilities as any other API.', url: 'https://www.clever-cloud.com/blog/' },
                    { speaker: 'Rob Hopkins', title: 'Fall in Love with the Future', summary: 'Using imagination and credible positive futures to move teams beyond passive technical resignation.', url: 'https://www.robhopkins.net/' }
                ],
                footerLeft: 'Further Reading',
                footerRight: 'Devoxx UK 2026'
            }
        ];

        let currentSlideIndex = 0;
        let renderSequence = 0;

        function renderSegmentPanel(mode) {
            const tone = mode.tone === 'red' ? 'text-red-300' : 'text-cyber-yellow';
            return `
                <div class="flex flex-col md:flex-row md:items-start gap-5">
                    <div class="flex-1">
                        <div class="${tone} text-xs uppercase tracking-widest font-mono font-bold mb-2">${mode.label}</div>
                        <h3 class="text-white text-xl md:text-2xl font-bold font-grotesk mb-3">${mode.heading}</h3>
                        <p class="text-slate-200 text-sm md:text-base leading-relaxed">${mode.text}</p>
                    </div>
                    <ul class="flex-1 space-y-3 text-sm md:text-base text-slate-300">
                        ${mode.points.map((point) => `<li class="flex items-start gap-2"><span class="text-cyber-yellow">&#9670;</span><span>${point}</span></li>`).join('')}
                    </ul>
                </div>
            `;
        }

        function renderAttackPanel(step) {
            return `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <div class="text-cyber-yellow text-xs uppercase tracking-widest font-mono font-bold mb-2">What happens</div>
                        <p class="text-slate-200 text-sm md:text-base leading-relaxed">${step.detail}</p>
                    </div>
                    <div>
                        <div class="text-cyber-yellow text-xs uppercase tracking-widest font-mono font-bold mb-2">Mitigation</div>
                        <p class="text-slate-200 text-sm md:text-base leading-relaxed">${step.mitigation}</p>
                    </div>
                </div>
            `;
        }

        function renderPolicyPanel(level) {
            return `
                <div class="text-cyber-yellow text-xs uppercase tracking-widest font-mono font-bold mb-2">${level.label}</div>
                <h3 class="text-white text-2xl md:text-3xl font-bold font-grotesk mb-4">${level.title}</h3>
                <p class="text-slate-200 text-sm md:text-base leading-relaxed">${level.text}</p>
            `;
        }

        function renderFloorPanel(pillar) {
            return `
                <div>
                    <div class="text-cyber-yellow text-xs uppercase tracking-widest font-mono font-bold mb-2">Floor observation</div>
                    <p class="text-white text-base md:text-lg font-grotesk leading-relaxed">${pillar.observation}</p>
                </div>
                <div>
                    <div class="text-cyber-yellow text-xs uppercase tracking-widest font-mono font-bold mb-2">EM operational parallel</div>
                    <p class="text-slate-200 text-sm md:text-base leading-relaxed">${pillar.parallel}</p>
                </div>
            `;
        }

        function setSegment(key) {
            const slide = slidesContent[currentSlideIndex];
            if (slide.layout !== 'segmented') return;
            document.querySelectorAll('.segment-button').forEach((button) => {
                button.classList.toggle('active', button.dataset.segment === key);
            });
            const mode = slide.modes[key];
            const panel = document.getElementById('segment-panel');
            panel.className = `border-2 rounded-2xl p-6 md:p-8 ${mode.tone === 'red' ? 'bg-red-950/30 border-red-700/70' : 'bg-cyber-blue/20 border-cyber-blue'}`;
            panel.innerHTML = renderSegmentPanel(mode);
        }

        function selectAttackStep(stepIndex) {
            const slide = slidesContent[currentSlideIndex];
            if (slide.layout !== 'attack-flow') return;
            document.querySelectorAll('.interactive-step').forEach((step, index) => {
                step.classList.toggle('active', index === stepIndex);
            });
            document.getElementById('attack-panel').innerHTML = renderAttackPanel(slide.attackSteps[stepIndex]);
        }

        function selectPolicyLevel(levelIndex) {
            const slide = slidesContent[currentSlideIndex];
            if (slide.layout !== 'policy-stack') return;
            document.querySelectorAll('.policy-level').forEach((level, index) => {
                level.classList.toggle('active', index === levelIndex);
            });
            document.getElementById('policy-panel').innerHTML = renderPolicyPanel(slide.policyLevels[levelIndex]);
        }

        function selectFloorPillar(pillarIndex) {
            const slide = slidesContent[currentSlideIndex];
            if (slide.layout !== 'incident-dashboard') return;
            document.querySelectorAll('.interactive-pillar').forEach((pillar, index) => {
                pillar.classList.toggle('active', index === pillarIndex);
            });
            document.getElementById('floor-panel').innerHTML = renderFloorPanel(slide.floorPillars[pillarIndex]);
        }

        function renderSlide(index) {
            const slide = slidesContent[index];
            const container = document.getElementById('slide-container');
            const titleBlock = document.getElementById('slide-title-block');
            const sequence = ++renderSequence;
            
            // 1. Update Persistent Header Category
            document.getElementById('slide-category-header').innerText = slide.category;

            // 2. Update Persistent Footer Metadata
            document.getElementById('slide-footer-left').innerText = slide.footerLeft || '';
            if (slide.layout === 'title' || slide.footerRight) {
                document.getElementById('slide-footer-right').innerText = slide.footerRight || 'Devoxx UK 2026';
            } else {
                document.getElementById('slide-footer-right').innerText = `Slide ${index + 1} of ${slidesContent.length}`;
            }

            // 3. Render and Synchronize Title Blocks
            if (slide.layout === 'title') {
                titleBlock.style.opacity = '0';
                setTimeout(() => {
                    if (sequence === renderSequence) titleBlock.classList.add('hidden');
                }, 150);
            } else {
                titleBlock.classList.remove('hidden');
                document.getElementById('slide-main-title').innerText = slide.title;
                document.getElementById('slide-main-subtitle').innerText = slide.subtitle || '';
                setTimeout(() => {
                    if (sequence === renderSequence) titleBlock.style.opacity = '1';
                }, 50);
            }
            
            // 4. Populate dynamic visual templates (Now completely free of jumping title elements!)
            let html = '';

            if (slide.layout === 'title') {
                html += `
                    <div class="flex-grow flex flex-col justify-center items-start space-y-6">
                        <div class="flex items-center gap-3 bg-cyber-blue/20 text-cyber-yellow border border-cyber-yellow/30 px-4 py-1.5 rounded-full text-xs font-bold font-grotesk tracking-wide uppercase">
                            <span>⚡ Engineering Report</span>
                        </div>
                        <h1 class="text-4xl md:text-6xl font-black tracking-tight font-grotesk leading-tight text-white">
                            ${slide.title}
                        </h1>
                        <h2 class="text-2xl md:text-3xl font-bold tracking-tight font-grotesk text-cyber-yellow leading-snug">
                            ${slide.highlightTitle}
                        </h2>
                        <p class="text-slate-300 font-medium text-sm md:text-base max-w-3xl leading-relaxed">
                            ${slide.description}
                        </p>
                    </div>
                `;
            } else if (slide.layout === 'segmented') {
                html += `
                    <div class="flex-grow flex flex-col justify-center gap-5">
                        <div class="bg-slate-950/70 border-2 border-cyber-blue rounded-2xl p-2 flex flex-col sm:flex-row gap-2">
                            ${Object.entries(slide.modes).map(([key, mode]) => `
                                <button class="segment-button ${key === 'traditional' ? 'active' : ''} flex-1 rounded-xl px-4 py-3 text-sm md:text-base font-bold font-grotesk text-slate-300" data-segment="${key}" onclick="setSegment('${key}')">
                                    ${mode.label}
                                </button>
                            `).join('')}
                        </div>
                        <div id="segment-panel" class="bg-red-950/30 border-2 border-red-700/70 rounded-2xl p-6 md:p-8">
                            ${renderSegmentPanel(slide.modes.traditional)}
                        </div>
                    </div>
                `;
            } else if (slide.layout === 'split') {
                html += `
                    <div class="flex-grow flex flex-col justify-center">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch">
                            <!-- Column 1 Card -->
                            <div class="bg-cyber-blue/10 p-6 rounded-2xl border-2 border-cyber-blue flex flex-col justify-between">
                                <div>
                                    <h3 class="text-cyber-yellow font-bold text-base mb-3 font-grotesk uppercase tracking-wider">${slide.col1Title}</h3>
                                    <p class="text-slate-300 text-sm md:text-base leading-relaxed">${slide.col1Text}</p>
                                </div>
                                <div class="mt-4 pt-3 border-t border-cyber-blue/30 flex items-center gap-2">
                                    <span class="w-2 h-2 rounded-full bg-cyber-yellow animate-ping"></span>
                                    <span class="text-[10px] text-slate-400 uppercase tracking-widest font-mono">Squad Priority</span>
                                </div>
                            </div>
                            
                            <!-- Column 2 Card -->
                            <div class="bg-cyber-blue/5 p-6 rounded-2xl border-2 border-dashed border-cyber-blue/60 flex flex-col justify-start space-y-4">
                                <h3 class="text-white font-bold text-base font-grotesk uppercase tracking-wider">${slide.col2Title}</h3>
                                <ul class="space-y-3 text-sm md:text-base text-slate-300">
                                    ${slide.col2Items.map((item) => `
                                        <li class="flex items-start gap-2">
                                            <span>${item}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
            } else if (slide.layout === 'metrics') {
                html += `
                    <div class="flex-grow flex flex-col justify-center">
                        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-center">
                            <!-- Huge Metric display -->
                            <div class="md:col-span-5 bg-cyber-blue/20 cyber-card p-6 rounded-2xl flex flex-col justify-center items-center text-center">
                                <div class="text-5xl md:text-7xl font-black font-grotesk text-cyber-yellow">${slide.mainMetric}</div>
                                <div class="text-[11px] font-bold text-white uppercase tracking-widest mt-2">${slide.metricLabel}</div>
                            </div>
                            
                            <!-- Context & checks -->
                            <div class="md:col-span-7 space-y-4">
                                <p class="text-slate-300 text-sm md:text-base leading-relaxed font-medium">${slide.colText}</p>
                                <div class="pt-2">
                                    <h4 class="text-xs font-bold text-cyber-yellow uppercase tracking-wider mb-2 font-grotesk">Cleared Checklists:</h4>
                                    <ul class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm text-slate-300">
                                        ${slide.checklists.map((check) => `
                                            <li class="flex items-center gap-2 bg-cyber-blue/10 px-3 py-1.5 rounded-lg border border-cyber-blue/30">
                                                <i class="fa-solid fa-circle-check text-cyber-yellow"></i>
                                                <span>${check}</span>
                                            </li>
                                        `).join('')}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (slide.layout === 'two-column') {
                html += `
                    <div class="flex-grow flex flex-col justify-center">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="bg-cyber-blue/10 p-6 rounded-2xl border-2 border-cyber-blue space-y-2">
                                <h3 class="text-cyber-yellow font-bold text-base font-grotesk uppercase tracking-wider mb-2">${slide.col1Title}</h3>
                                <p class="text-slate-300 text-sm md:text-base leading-relaxed">${slide.col1Text}</p>
                            </div>
                            <div class="bg-cyber-blue/10 p-6 rounded-2xl border-2 border-cyber-blue space-y-2">
                                <h3 class="text-cyber-yellow font-bold text-base font-grotesk uppercase tracking-wider mb-2">${slide.col2Title}</h3>
                                <p class="text-slate-300 text-sm md:text-base leading-relaxed">${slide.col2Text}</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if (slide.layout === 'attack-flow') {
                html += `
                    <div class="flex-grow flex flex-col justify-center gap-5">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 items-stretch">
                            ${slide.attackSteps.map((step, stepIndex) => `
                                <button class="interactive-step ${stepIndex === 0 ? 'active' : ''} text-left bg-cyber-blue/10 p-5 rounded-2xl border-2 border-cyber-blue relative" onclick="selectAttackStep(${stepIndex})">
                                    <div class="text-[10px] text-cyber-yellow uppercase tracking-widest font-mono font-bold mb-3">0${stepIndex + 1}</div>
                                    <h3 class="text-white font-bold text-base font-grotesk mb-2">${step.label}</h3>
                                    <p class="text-slate-300 text-sm leading-relaxed">${step.short}</p>
                                    ${stepIndex < slide.attackSteps.length - 1 ? '<span class="hidden md:block absolute -right-3 top-1/2 text-cyber-yellow text-xl">&#8594;</span>' : ''}
                                </button>
                            `).join('')}
                        </div>
                        <div id="attack-panel" class="bg-cyber-yellow/10 border-2 border-cyber-yellow/50 rounded-2xl p-5 md:p-6">
                            ${renderAttackPanel(slide.attackSteps[0])}
                        </div>
                    </div>
                `;
            } else if (slide.layout === 'policy-stack') {
                html += `
                    <div class="flex-grow grid grid-cols-1 md:grid-cols-12 gap-5 items-stretch content-center">
                        <div class="md:col-span-5 flex flex-col gap-3">
                            ${slide.policyLevels.map((level, levelIndex) => `
                                <button class="policy-level ${levelIndex === 0 ? 'active' : ''} text-left bg-cyber-blue/10 border-2 border-cyber-blue rounded-2xl p-4" onclick="selectPolicyLevel(${levelIndex})">
                                    <span class="text-[10px] text-cyber-yellow uppercase tracking-widest font-mono font-bold">${level.label}</span>
                                    <span class="block text-white font-bold text-lg font-grotesk mt-1">${level.title}</span>
                                </button>
                            `).join('')}
                        </div>
                        <div id="policy-panel" class="md:col-span-7 bg-cyber-yellow/10 border-2 border-cyber-yellow/50 rounded-2xl p-6 md:p-8 flex flex-col justify-center">
                            ${renderPolicyPanel(slide.policyLevels[0])}
                        </div>
                    </div>
                `;
            } else if (slide.layout === 'incident-dashboard') {
                html += `
                    <div class="flex-grow flex flex-col justify-center gap-5">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                            ${slide.floorPillars.map((pillar, pillarIndex) => `
                                <button class="interactive-pillar ${pillarIndex === 0 ? 'active' : ''} text-left bg-cyber-blue/10 border-2 border-cyber-blue rounded-2xl p-5" onclick="selectFloorPillar(${pillarIndex})">
                                    <span class="text-[10px] text-cyber-yellow uppercase tracking-widest font-mono font-bold">Pillar 0${pillarIndex + 1}</span>
                                    <span class="block text-white font-bold text-base font-grotesk mt-2">${pillar.label}</span>
                                </button>
                            `).join('')}
                        </div>
                        <div id="floor-panel" class="grid grid-cols-1 md:grid-cols-2 gap-5 bg-cyber-blue/10 border-2 border-cyber-yellow/50 rounded-2xl p-6 md:p-8">
                            ${renderFloorPanel(slide.floorPillars[0])}
                        </div>
                    </div>
                `;
            } else if (slide.layout === 'references') {
                html += `
                    <div class="flex-grow grid grid-cols-1 md:grid-cols-2 gap-4 content-center">
                        ${slide.references.map((reference) => `
                            <a href="${reference.url}" target="_blank" rel="noopener noreferrer" class="bg-cyber-blue/10 border-2 border-cyber-blue rounded-2xl p-5 hover:bg-cyber-blue/25 transition block">
                                <div class="text-cyber-yellow text-xs uppercase tracking-widest font-mono font-bold mb-2">${reference.speaker}</div>
                                <h3 class="text-white font-bold text-lg font-grotesk mb-2">${reference.title} <span aria-hidden="true">&#8599;</span></h3>
                                <p class="text-slate-300 text-sm leading-relaxed">${reference.summary}</p>
                            </a>
                        `).join('')}
                    </div>
                `;
            } else if (slide.layout === 'architecture' || slide.layout === 'flow') {
                const steps = slide.architectureSteps || slide.flowSteps;
                html += `
                    <div class="flex-grow flex flex-col justify-center gap-6">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 items-stretch">
                            ${steps.map((step, stepIndex) => `
                                <div class="relative bg-cyber-blue/10 p-5 rounded-2xl border-2 ${slide.layout === 'flow' ? 'border-cyber-yellow/60' : 'border-cyber-blue'} flex flex-col justify-between">
                                    <div class="text-[10px] text-cyber-yellow uppercase tracking-widest font-mono font-bold mb-3">0${stepIndex + 1}</div>
                                    <h3 class="text-white font-bold text-base font-grotesk mb-2">${step.label}</h3>
                                    <p class="text-slate-300 text-sm leading-relaxed">${step.text}</p>
                                    ${stepIndex < steps.length - 1 ? '<span class="hidden md:block absolute -right-3 top-1/2 text-cyber-yellow text-xl">&#8594;</span>' : ''}
                                </div>
                            `).join('')}
                        </div>
                        <div class="bg-cyber-yellow/10 border-2 border-cyber-yellow/50 rounded-2xl p-5">
                            <h3 class="text-cyber-yellow font-bold text-sm uppercase tracking-wider font-grotesk mb-2">${slide.calloutTitle}</h3>
                            <p class="text-slate-200 text-sm md:text-base leading-relaxed">${slide.calloutText}</p>
                        </div>
                    </div>
                `;
            } else if (slide.layout === 'actions') {
                html += `
                    <div class="flex-grow flex flex-col justify-center gap-4">
                        ${slide.actions.map((action) => `
                            <div class="grid grid-cols-[auto_1fr] gap-5 items-start bg-cyber-blue/10 border-2 border-cyber-blue rounded-2xl p-5">
                                <div class="text-2xl md:text-3xl font-black font-grotesk text-cyber-yellow">${action.number}</div>
                                <div>
                                    <h3 class="text-white font-bold text-lg font-grotesk mb-1">${action.title}</h3>
                                    <p class="text-slate-300 text-sm md:text-base leading-relaxed">${action.text}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (slide.layout === 'quote') {
                html += `
                    <div class="flex-grow flex flex-col justify-center">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch my-auto">
                            <!-- Quote A -->
                            <div class="bg-cyber-blue/10 p-6 rounded-2xl border-2 border-cyber-blue relative flex flex-col justify-between">
                                <span class="absolute top-2 right-4 text-5xl text-cyber-blue/30 font-serif">“</span>
                                <div>
                                    <span class="text-[10px] text-cyber-yellow uppercase tracking-widest font-mono font-bold block mb-2">Corporate Provider Perspective</span>
                                    <p class="text-slate-300 text-sm md:text-base italic leading-relaxed">"${slide.quote}"</p>
                                </div>
                                <p class="text-xs text-slate-400 font-semibold mt-4 border-t border-cyber-blue/30 pt-2">— ${slide.attribution}</p>
                            </div>
                            
                            <!-- Quote B -->
                            <div class="bg-cyber-blue/5 p-6 rounded-2xl border-2 border-dashed border-cyber-yellow/40 relative flex flex-col justify-between">
                                <span class="absolute top-2 right-4 text-5xl text-cyber-yellow/10 font-serif">“</span>
                                <div>
                                    <span class="text-[10px] text-cyber-yellow uppercase tracking-widest font-mono font-bold block mb-2">Security Researcher Reality</span>
                                    <p class="text-slate-300 text-sm md:text-base italic leading-relaxed">"${slide.counterQuote}"</p>
                                </div>
                                <p class="text-xs text-slate-400 font-semibold mt-4 border-t border-cyber-blue/30 pt-2">— ${slide.counterAttribution}</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            // Animate transition by fading container opacity
            container.style.opacity = '0';
            setTimeout(() => {
                if (sequence !== renderSequence) return;
                container.innerHTML = html;
                container.style.opacity = '1';
            }, 400);
        }

        function updateDeckIndicators() {
            document.getElementById('slide-indicator').innerText = `${currentSlideIndex + 1} / ${slidesContent.length}`;
            renderSlide(currentSlideIndex);
        }

        function nextSlide() {
            if (currentSlideIndex < slidesContent.length - 1) {
                currentSlideIndex++;
                updateDeckIndicators();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateDeckIndicators();
            }
        }

        // BIND PRESENTATION KEYBOARD INTERACTION
        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight' || event.key === ' ') {
                nextSlide();
            } else if (event.key === 'ArrowLeft') {
                prevSlide();
            }
        });

        // LOAD FIRST INITIAL STATE
        window.onload = function() {
            updateDeckIndicators();
        };
    </script>
</body>
</html>
