            container.style.opacity = '0';

                document.getElementById('slide-footer-right').innerText = `Slide ${index + 1} of ${slidesContent.length}`;

                const progressPercentage = ((index + 1) / slidesContent.length) * 100;
                document.getElementById('progress-indicator').style.width = `${progressPercentage}%`;

                container.offsetHeight; // force reflow
                container.style.opacity = '1';

                setTimeout(() => {
                    isTransitioning = false;
                }, 400);

            }, 400);

            } else if (slide.layout === 'two-column-role') {

            } else if (slide.layout === 'action-plan') {
                html += `
                    <div class="flex-grow flex flex-col justify-center py-1">

            } else if (slide.layout === 'references') {

                    <div class="flex-grow flex flex-col justify-center py-1">

                            ${slide.sources.map(src => `
                                <a href="${src.url}" target="_blank" rel="noopener noreferrer" class="group block bg-blue-950/20 border border-blue-900 hover:border-cyber-yellow/50 p-4 rounded-xl transition-all duration-200">
                                    <div class="flex justify-between items-start gap-2 mb-1">

                `;
            } else if (slide.layout === 'appendix-engine') {
                // FIXED HEIGHT APPLIED TO RIGHT HAND BOX (h-[360px] with scroll override to guarantee 0 movement)
                html += `
                    <div class="flex-grow flex flex-col justify-center py-1">
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
                            <!-- Left Column: Core Subsystems Selector -->
                            <div class="lg:col-span-6 space-y-2.5" onclick="event.stopPropagation()">
                                ${slide.systems.map((system, sIdx) => `
                                    <div id="appendix-system-${sIdx}" onclick="selectAppendixTab(${sIdx})" class="group cursor-pointer transition-all duration-200 bg-gradient-to-r ${activeAppendixTab === sIdx ? 'from-blue-900/70 to-slate-900/80 border-l-4 border-cyber-yellow ring-1 ring-blue-500/30' : 'from-blue-950/30 to-slate-900/50 border-l-4 border-transparent hover:border-blue-500/40'} p-3.5 rounded-r-xl flex items-center justify-between gap-2">
                                        <div>
                                            <h4 class="text-[10px] font-mono text-slate-400 uppercase tracking-widest">DECK SUBSYSTEM 0${sIdx + 1}</h4>
                                            <h3 class="${activeAppendixTab === sIdx ? 'text-cyber-yellow' : 'text-slate-300 group-hover:text-white'} font-bold text-sm md:text-base font-grotesk tracking-wide">${system.title}</h3>
                                        </div>
                                        <i class="fa-solid fa-chevron-right text-xs transition-transform ${activeAppendixTab === sIdx ? 'text-cyber-yellow translate-x-1' : 'text-slate-600'}"></i>
                                    </div>

                            </div>

                            <!-- Right Column: Interactive Console -->
                            <div class="lg:col-span-6 bg-slate-950/80 border-2 border-blue-900/60 p-6 rounded-2xl flex flex-col justify-between shadow-2xl font-mono h-[360px] overflow-y-auto">
                                <div class="space-y-4">
                                    <div class="flex items-center justify-between border-b border-blue-900/40 pb-3">
                                        <span class="inline-flex items-center gap-1.5 text-xs font-bold text-green-400 bg-green-950/40 border border-green-500/20 px-2.5 py-1 rounded-md">
                                            <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
                                            Deck Performance Stats
                                        </span>
                                        <div class="text-[10px] text-slate-400">
                                            Size: <span class="text-cyber-yellow font-bold">12KB</span>

                                    <div class="space-y-3">

                                    </div>

                                    <div class="space-y-2 pt-2 border-t border-blue-900/20">
                                        <h4 class="text-xs uppercase font-sans tracking-wider text-cyber-yellow font-bold">HTML Rendering Advantage:</h4>
                                        <p class="text-slate-300 text-xs md:text-sm leading-relaxed font-sans border-l-2 border-cyber-yellow pl-3">${slide.systems[activeAppendixTab].advantage}</p>
                                    </div>

                                <div class="pt-4 border-t border-blue-900/30 flex justify-between items-center text-[10px] text-slate-500">
                                    <span>Render Latency: <span class="text-green-400 font-bold">0.04ms</span></span>
                                    <span>Run-time Libs: <span class="text-red-400 font-bold">0</span></span>

                        </div>
                    </div>

            container.innerHTML = html;

        // Jump Directly to any Slide from Timeline Click
        function jumpToSlide(event) {
            // Prevent this click from bubbling up and triggering a double slide advance
            event.stopPropagation();
            if (isTransitioning) return;

            const rect = event.currentTarget.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const percentage = clickX / rect.width;

            // Map click coordinate accurately to the slide index boundary
            const targetIndex = Math.min(
                slidesContent.length - 1,
                Math.max(0, Math.floor(percentage * slidesContent.length))
            );

            // Avoid triggering full transition re-renders if we are already on the clicked slide
            if (targetIndex !== currentSlideIndex) {
                currentSlideIndex = targetIndex;
                updateDeckIndicators();
            }
        }

        // Floor Insights Selection (Slide 8)
        function selectFloorInsight(pIdx) {
            activeFloorInsight = pIdx;
            renderSlide(currentSlideIndex, true);
        }

        // Action Path Highlight Action (Slide 5)
        function highlightStep(event, stepIdx) {
            event.stopPropagation();

            document.querySelectorAll('.path-step').forEach((el, index) => {
                if (index === stepIdx) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });

            const explanationBlock = document.getElementById('attack-diagram-explanation');
            const explanations = [
                "<strong>Step 1 Context:</strong> System input pipelines must validate payload parameters and enforce structured metadata limits before delivery to LLMs.",
                "<strong>Step 2 Context:</strong> Indirect prompt injection targets are completely unvalidated system data files. Treat all inputs as highly toxic payloads.",
                "<strong>Step 3 Context:</strong> The LLM processes dynamic instructions and operational code in a single un-sandboxed memory buffer, causing immediate hijack.",
                "<strong>Step 4 Context:</strong> Without explicit transaction verification or strict read-only execution boundaries, agent actions will trigger severe database destruction."
            ];
            explanationBlock.innerHTML = `<i class="fa-solid fa-circle-info text-cyber-yellow mr-2 animate-pulse"></i>` + explanations[stepIdx];
        }

        // Slide 2 Interactive Tab Control
        function setShiftTab(tab) {
            activeShiftTab = tab;
            renderSlide(currentSlideIndex, true);
        }

        // Slide 6 Interactive Control Stack Selection
        function selectControlLayer(levelIdx) {
            activeControlLevel = levelIdx;
            renderSlide(currentSlideIndex, true);
        }

        // Slide 11 Appendix System Selector
        function selectAppendixTab(sIdx) {
            activeAppendixTab = sIdx;
            renderSlide(currentSlideIndex, true);
        }

        function updateDeckIndicators() {
            renderSlide(currentSlideIndex);
        }

        function nextSlide() {
            if (isTransitioning) return;
            if (currentSlideIndex < slidesContent.length - 1) {
                currentSlideIndex++;
                updateDeckIndicators();
            }
        }

        function prevSlide() {
            if (isTransitioning) return;
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateDeckIndicators();
            }
        }

        // BIND PRESENTATION KEYBOARD INTERACTION
        document.addEventListener('keydown', (event) => {
            if (isTransitioning) return;
            if (event.key === 'ArrowRight' || event.key === ' ') {
                nextSlide();
            } else if (event.key === 'ArrowLeft') {
                prevSlide();
            }
        });

        // BIND INTUITIVE SCREEN CLICK INTERACTION
        document.getElementById('presentation-deck').addEventListener('click', (event) => {
            if (isTransitioning) return;

            // Ignore if clicking on designated interactive targets or the timeline
            if (
                event.target.closest('.path-step') ||
                event.target.closest('[onclick^="selectControlLayer"]') ||
                event.target.closest('[onclick^="setShiftTab"]') ||
                event.target.closest('[onclick^="selectFloorInsight"]') ||
                event.target.closest('[onclick^="selectAppendixTab"]') ||
                event.target.closest('#progress-bar-container')
            ) {
                return;
            }

            const rect = event.currentTarget.getBoundingClientRect();
            const relativeX = event.clientX - rect.left;

            if (relativeX < rect.width * 0.15) {
                prevSlide();
            } else {
                nextSlide();
            }
        });

        // MOBILE SWIPE GESTURE DETECTOR
        let touchStartX = 0;
        let touchEndX = 0;
        const deckElement = document.getElementById('presentation-deck');

        deckElement.addEventListener('touchstart', (event) => {
            touchStartX = event.changedTouches[0].screenX;
        }, { passive: true });

        deckElement.addEventListener('touchend', (event) => {
            touchEndX = event.changedTouches[0].screenX;
            handleSwipeGesture();
        }, { passive: true });

        function handleSwipeGesture() {
            const threshold = 50;
            if (isTransitioning) return;

            if (touchEndX < touchStartX - threshold) {
                nextSlide();
            } else if (touchEndX > touchStartX + threshold) {
                prevSlide();
            }
        }

        window.onload = function() {
            updateDeckIndicators();
        };
    </script>
