        // Jump Directly to any Slide from Timeline Click
        function jumpToSlide(event) {
            event.stopPropagation();

            const rect = event.currentTarget.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const percentage = clickX / rect.width;
            
            const targetIndex = Math.min(
                slidesContent.length - 1, 
                Math.max(0, Math.floor(percentage * slidesContent.length))
            );

            if (targetIndex !== currentSlideIndex) {
                currentSlideIndex = targetIndex;
                updateDeckIndicators();
            }
        }

        // Floor Insights Selection (Slide 8)
        function selectFloorInsight(pIdx) {
            activeFloorInsight = pIdx;
            renderSlide(currentSlideIndex, true);
        }

        // Volunteer journey selector (Slide 5)
        function selectExperienceMoment(momentIdx) {
            activeExperienceMoment = momentIdx;
            renderSlide(currentSlideIndex, true);
        }

        // Hopkins keynote selector (Slide 6)
        function setFutureStory(view) {
            activeFutureStory = view;
            renderSlide(currentSlideIndex, true);
        }

        // Action Path Highlight Action (Slide 5)
        function highlightStep(event, stepIdx) {
            event.stopPropagation();
            
            document.querySelectorAll('.path-step').forEach((el, index) => {
                if (index === stepIdx) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
            
            const explanationBlock = document.getElementById('attack-diagram-explanation');
            const explanations = [
                "<strong>Control point:</strong> Classify external content as untrusted before it reaches the model, and preserve its source and provenance for the policy layer.",
                "<strong>Control point:</strong> Do not assume a prompt can keep instruction and data separate. The model’s output remains a proposal, not authority.",
                "<strong>Control point:</strong> Validate the proposed tool and typed arguments against deterministic policy, user intent and least-privilege scope.",
                "<strong>Control point:</strong> Restrict the tool by default, require confirmation for irreversible actions and audit exactly who authorised execution."
            ];
            explanationBlock.innerHTML = `<i class="fa-solid fa-circle-info text-cyber-yellow mr-2"></i>` + explanations[stepIdx];
        }

        // Slide 2 Interactive Tab Control
        function setShiftTab(tab) {
            activeShiftTab = tab;
            renderSlide(currentSlideIndex, true);
        }

        // Slide 6 Interactive Control Stack Selection
        function selectControlLayer(levelIdx) {
            activeControlLevel = levelIdx;
            renderSlide(currentSlideIndex, true);
        }

        // Slide 13 Appendix Selector Tab
        function selectAppendixTab(sIdx) {
            activeAppendixTab = sIdx;
            renderSlide(currentSlideIndex, true);
        }

        function updateDeckIndicators() {
            renderSlide(currentSlideIndex);
        }

        function toggleMobilePreview(event) {
            event.stopPropagation();
            document.body.classList.toggle('mobile-preview');

            const button = document.getElementById('mobile-toggle');
            const isMobile = document.body.classList.contains('mobile-preview');
            button.classList.toggle('active', isMobile);
            button.setAttribute('aria-label', isMobile ? 'Exit mobile preview' : 'Show mobile preview');
            button.title = isMobile ? 'Exit mobile preview' : 'Show mobile preview';
        }

        function exitMobilePreview(event) {
            event.stopPropagation();
            document.body.classList.remove('mobile-preview');

            const button = document.getElementById('mobile-toggle');
            button.classList.remove('active');
            button.setAttribute('aria-label', 'Show mobile preview');
            button.title = 'Show mobile preview';
        }

        function nextSlide() {
            if (currentSlideIndex < slidesContent.length - 1) {
                currentSlideIndex++;
                updateDeckIndicators();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateDeckIndicators();
            }
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight' || event.key === ' ') {
                nextSlide();
            } else if (event.key === 'ArrowLeft') {
                prevSlide();
            }
        });

        document.getElementById('presentation-deck').addEventListener('click', (event) => {
            if (
                event.target.closest('.path-step') || 
                event.target.closest('[onclick^="selectControlLayer"]') || 
                event.target.closest('[onclick^="setShiftTab"]') || 
                event.target.closest('[onclick^="selectFloorInsight"]') ||
                event.target.closest('[onclick^="selectExperienceMoment"]') ||
                event.target.closest('[onclick^="setFutureStory"]') ||
                event.target.closest('[onclick^="selectAppendixTab"]') ||
                event.target.closest('#progress-bar-container')
            ) {
                return;
            }

            const rect = event.currentTarget.getBoundingClientRect();
            const relativeX = event.clientX - rect.left;
            
            if (relativeX < rect.width * 0.15) {
                prevSlide();
            } else {
                nextSlide();
            }
        });

        let touchStartX = 0;
        let touchEndX = 0;
        const deckElement = document.getElementById('presentation-deck');

        deckElement.addEventListener('touchstart', (event) => {
            touchStartX = event.changedTouches[0].screenX;
        }, { passive: true });

        deckElement.addEventListener('touchend', (event) => {
            touchEndX = event.changedTouches[0].screenX;
            handleSwipeGesture();
        }, { passive: true });

        function handleSwipeGesture() {
            const threshold = 50; 

            if (touchEndX < touchStartX - threshold) {
                nextSlide(); 
            } else if (touchEndX > touchStartX + threshold) {
                prevSlide(); 
            }
        }

        window.onload = function() {
            updateDeckIndicators();
        };
    </script>
