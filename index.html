            {

                    { title: 'Room Monitor', label: 'Feedback loops', detail: 'I introduced myself to speakers, worked with AV technicians, tracked occupancy with physical clickers 10-15 minutes into sessions, reported counts and room photos, kept time discreetly and ran microphones during Q&A.', takeaway: 'Small, timely signals are operationally valuable when they reach the people who can act on them.' },

            {

                primitives: [

                layout: 'controls-stack',
                category: '05. MCP Architecture',
                title: 'Put Controls Outside the Model',
                subtitle: 'MCP servers are APIs, not plug-and-play scripts. The model still needs external controls.',
                speakerName: 'Horacio Gonzalez',
                speakerImage: 'https://lostinbrittany.dev/img/lostinbrittany_photo_250px.jpg',
                layers: [
                    { level: 'Level 1: Connection Identity', text: 'Secure the connection between host and server, then bind every request to the real user identity. The model is never the trusted principal.' },

        let currentSlideIndex = 0;
        let activeTransitionTimeout = null;

        // Active State trackers for dynamic slides
        let activeFloorInsight = 0;
        let activeShiftTab = 'async';
        let activeControlLevel = 0;
        let activeAppendixTab = 0;
        let activeExperienceMoment = 0;
        let activeFutureStory = 'story';

        function renderSlide(index, isInternalUpdate = false) {
            const slide = slidesContent[index];
            const container = document.getElementById('slide-container');

            if (isInternalUpdate) {
                compileAndInject(slide, container, index);
                return;
            }

            if (activeTransitionTimeout) {
                clearTimeout(activeTransitionTimeout);
            }

            document.getElementById('slide-category-header').innerText = slide.category;
            document.getElementById('slide-footer-left').innerText = slide.footerLeft || '';
            document.getElementById('slide-footer-right').innerText = `Slide ${index + 1} of ${slidesContent.length}`;

            container.classList.toggle('overflow-hidden', slide.layout === 'controls-stack');
            container.classList.toggle('overflow-y-auto', slide.layout !== 'controls-stack');

            const progressPercentage = ((index + 1) / slidesContent.length) * 100;
            document.getElementById('progress-indicator').style.width = `${progressPercentage}%`;

            container.style.transition = 'opacity 0.12s ease-out';
            container.style.opacity = '0';

            activeTransitionTimeout = setTimeout(() => {
                compileAndInject(slide, container, index);
                container.style.transition = 'opacity 0.15s ease-in';
                container.style.opacity = '1';
                activeTransitionTimeout = null;
            }, 120);
        }

        function compileAndInject(slide, container, index) {
            let html = '';

            if (slide.layout !== 'thesis' && slide.layout !== 'close-action') {
                html += `
                    <div class="flex-shrink-0 mb-8 md:mb-10">
                        <h2 class="text-2xl md:text-3.5xl font-bold text-white font-grotesk tracking-tight">${slide.title}</h2>
                        <p class="text-xs md:text-sm text-slate-300 font-medium mt-4 md:mt-5 max-w-5xl">${slide.subtitle || ''}</p>
                        ${slide.speakerImage ? `
                            <div class="inline-flex items-center gap-2 mt-3 px-2.5 py-1.5 rounded-lg bg-blue-950/40 border border-blue-900/50">
                                <img src="${slide.speakerImage}" alt="${slide.speakerName}" class="w-8 h-8 rounded-full border border-cyber-yellow/40 object-cover">
                                <span class="text-xs font-semibold text-slate-200">${slide.speakerName}</span>
                            </div>
                        ` : ''}
                    </div>
                `;
            }

        // Jump Directly to any Slide from Timeline Click
        function jumpToSlide(event) {
            event.stopPropagation();

            const rect = event.currentTarget.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const percentage = clickX / rect.width;

            const targetIndex = Math.min(
                slidesContent.length - 1,
                Math.max(0, Math.floor(percentage * slidesContent.length))
            );

            if (targetIndex !== currentSlideIndex) {
                currentSlideIndex = targetIndex;
                updateDeckIndicators();
            }
        }

        // Floor Insights Selection (Slide 8)
        function selectFloorInsight(pIdx) {
            activeFloorInsight = pIdx;
            renderSlide(currentSlideIndex, true);
        }

        // Volunteer journey selector (Slide 5)
        function selectExperienceMoment(momentIdx) {
            activeExperienceMoment = momentIdx;
            renderSlide(currentSlideIndex, true);
        }

        // Hopkins keynote selector (Slide 6)
        function setFutureStory(view) {
            activeFutureStory = view;
            renderSlide(currentSlideIndex, true);
        }

        // Action Path Highlight Action (Slide 5)
        function highlightStep(event, stepIdx) {
            event.stopPropagation();

            document.querySelectorAll('.path-step').forEach((el, index) => {
                if (index === stepIdx) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });

            const explanationBlock = document.getElementById('attack-diagram-explanation');
            const explanations = [
                "<strong>Control point:</strong> Classify external content as untrusted before it reaches the model, and preserve its source and provenance for the policy layer.",
                "<strong>Control point:</strong> Do not assume a prompt can keep instruction and data separate. The model’s output remains a proposal, not authority.",
                "<strong>Control point:</strong> Validate the proposed tool and typed arguments against deterministic policy, user intent and least-privilege scope.",
                "<strong>Control point:</strong> Restrict the tool by default, require confirmation for irreversible actions and audit exactly who authorised execution."
            ];
            explanationBlock.innerHTML = `<i class="fa-solid fa-circle-info text-cyber-yellow mr-2"></i>` + explanations[stepIdx];
        }

        // Slide 2 Interactive Tab Control
        function setShiftTab(tab) {
            activeShiftTab = tab;
            renderSlide(currentSlideIndex, true);
        }

        // Slide 6 Interactive Control Stack Selection
        function selectControlLayer(levelIdx) {
            activeControlLevel = levelIdx;
            renderSlide(currentSlideIndex, true);
        }

        // Slide 13 Appendix Selector Tab
        function selectAppendixTab(sIdx) {
            activeAppendixTab = sIdx;
            renderSlide(currentSlideIndex, true);
        }

        function updateDeckIndicators() {
            renderSlide(currentSlideIndex);
        }

        async function toggleFullscreen(event) {
            event.stopPropagation();

            if (!document.fullscreenElement) {
                await document.getElementById('presentation-deck').requestFullscreen();
            } else {
                await document.exitFullscreen();
            }
        }

        function updateFullscreenButton() {
            const button = document.getElementById('fullscreen-toggle');
            if (!button) return;

            const isFullscreen = Boolean(document.fullscreenElement);
            button.setAttribute('aria-label', isFullscreen ? 'Exit fullscreen' : 'Enter fullscreen');
            button.title = isFullscreen ? 'Exit fullscreen' : 'Enter fullscreen';
            button.innerHTML = isFullscreen
                ? '<i class="fa-solid fa-compress" aria-hidden="true"></i>'
                : '<i class="fa-solid fa-expand" aria-hidden="true"></i>';
        }

        function nextSlide() {
            if (currentSlideIndex < slidesContent.length - 1) {
                currentSlideIndex++;
                updateDeckIndicators();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateDeckIndicators();
            }
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight' || event.key === ' ') {
                nextSlide();
            } else if (event.key === 'ArrowLeft') {
                prevSlide();
            }
        });

        document.addEventListener('fullscreenchange', updateFullscreenButton);

        document.getElementById('presentation-deck').addEventListener('click', (event) => {
            if (
                event.target.closest('.path-step') ||
                event.target.closest('[onclick^="selectControlLayer"]') ||
                event.target.closest('[onclick^="setShiftTab"]') ||
                event.target.closest('[onclick^="selectFloorInsight"]') ||
                event.target.closest('[onclick^="selectExperienceMoment"]') ||
                event.target.closest('[onclick^="setFutureStory"]') ||
                event.target.closest('[onclick^="selectAppendixTab"]') ||
                event.target.closest('#progress-bar-container')
            ) {
                return;
            }

            const rect = event.currentTarget.getBoundingClientRect();
            const relativeX = event.clientX - rect.left;

            if (relativeX < rect.width * 0.15) {
                prevSlide();
            } else {
                nextSlide();
            }
        });

        let touchStartX = 0;
        let touchEndX = 0;
        const deckElement = document.getElementById('presentation-deck');

        deckElement.addEventListener('touchstart', (event) => {
            touchStartX = event.changedTouches[0].screenX;
        }, { passive: true });

        deckElement.addEventListener('touchend', (event) => {
            touchEndX = event.changedTouches[0].screenX;
            handleSwipeGesture();
        }, { passive: true });

        function handleSwipeGesture() {
            const threshold = 50;

            if (touchEndX < touchStartX - threshold) {
                nextSlide();
            } else if (touchEndX > touchStartX + threshold) {
                prevSlide();
            }
        }

        window.onload = function() {
            updateDeckIndicators();
        };
    </script>
